name: Frontend Guardian

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  frontend-guardian:
    name: Frontend Guardian (min score 70)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      # Change path to your frontend folder if needed (e.g. ./frontend)
      - name: Run Frontend Guardian
        run: npx frontend-guardian@latest . --fail-on-score 70
        env:
          CI: true
